<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face {
  font-family: 'Inter';
  font-weight: 600;
  src: url('../node_modules/@fontsource/inter/files/inter-latin-600-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Inter';
  font-weight: 700;
  src: url('../node_modules/@fontsource/inter/files/inter-latin-700-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Inter';
  font-weight: 800;
  src: url('../node_modules/@fontsource/inter/files/inter-latin-800-normal.woff2') format('woff2');
}

:root {
  --dark: #141413;
  --cream: #FAF9F5;
  --coral: #D97757;
  --coral-soft: #E89A80;
  --coral-deep: #8B3F2B;
  --muted: #B0AEA5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1400px;
  height: 350px;
  overflow: hidden;
  background: var(--dark);
}

.stage {
  position: relative;
  width: 1400px;
  height: 350px;
  background: var(--dark);
  overflow: hidden;
}

/* ---------- background ---------- */
.bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.blob {
  position: absolute;
  border-radius: 50%;
  will-change: transform, opacity;
  filter: blur(70px);
  mix-blend-mode: screen;
}

.blob-a {
  width: 520px;
  height: 520px;
  left: 340px;
  top: -110px;
  background: radial-gradient(circle at 50% 50%, var(--coral) 0%, rgba(217,119,87,0) 70%);
}

.blob-b {
  width: 520px;
  height: 520px;
  left: 560px;
  top: -70px;
  background: radial-gradient(circle at 50% 50%, var(--coral-deep) 0%, rgba(139,63,43,0) 72%);
}

.blob-c {
  width: 460px;
  height: 460px;
  left: 470px;
  top: 30px;
  background: radial-gradient(circle at 50% 50%, var(--coral-soft) 0%, rgba(232,154,128,0) 70%);
  filter: blur(95px);
  opacity: 0.5;
}

.vignette {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 900px 500px at 50% 50%, rgba(20,20,19,0) 40%, rgba(20,20,19,0.55) 100%),
    linear-gradient(180deg, rgba(20,20,19,0.25) 0%, rgba(20,20,19,0) 30%, rgba(20,20,19,0) 70%, rgba(20,20,19,0.35) 100%);
  pointer-events: none;
}

/* grain texture removed: at this size it fought the lossy WebP encoder
   for bits (noise is expensive to compress) and softened text edges more
   than it added perceived depth */

/* ---------- content ---------- */
.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
}

.headline {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 64px;
  letter-spacing: -0.02em;
  color: var(--cream);
  display: flex;
  gap: 20px;
  position: relative;
  white-space: nowrap;
}

.word {
  display: inline-block;
  position: relative;
  will-change: transform, opacity, filter;
}

.word-accent {
  font-weight: 800;
  color: var(--coral);
  position: relative;
}

.shimmer {
  position: absolute;
  inset: -10% -20%;
  background: linear-gradient(100deg,
    rgba(250,249,245,0) 34%,
    rgba(255,214,190,0.55) 49%,
    rgba(250,249,245,0) 64%);
  mix-blend-mode: soft-light;
  pointer-events: none;
  will-change: transform, opacity;
}

.underline-wrap {
  position: relative;
  width: 420px;
  height: 14px;
}

.underline-wrap svg {
  position: absolute;
  inset: 0;
  overflow: visible;
}

.underline-track {
  fill: none;
  stroke: var(--coral);
  stroke-width: 3;
  stroke-linecap: round;
}

.underline-draw {
  fill: none;
  stroke: var(--coral);
  stroke-width: 3;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px rgba(217,119,87,0.65));
}

.underline-dot {
  fill: var(--cream);
  filter: drop-shadow(0 0 5px rgba(217,119,87,0.9));
}

.spark {
  position: absolute;
  border-radius: 50%;
  background: var(--coral-soft);
  filter: blur(0.5px);
  box-shadow: 0 0 10px 2px rgba(217,119,87,0.7);
  will-change: transform, opacity;
}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="bg">
      <div class="blob blob-a" id="blobA"></div>
      <div class="blob blob-c" id="blobC"></div>
      <div class="blob blob-b" id="blobB"></div>
      <div class="vignette"></div>
    </div>

    <div class="content">
      <h1 class="headline" id="headline">
        <span class="word" id="wBuilt">Built</span><span class="word" id="wWith">with</span><span class="word word-accent" id="wClaude">Claude Code<span class="shimmer" id="shimmer"></span></span>
      </h1>
      <div class="underline-wrap">
        <svg viewBox="0 0 420 14" preserveAspectRatio="none">
          <path class="underline-track" id="underlineTrack" d="M4,7 L416,7"/>
          <path class="underline-draw" id="underlineDraw" d="M4,7 L416,7" stroke-dasharray="412" stroke-dashoffset="412"/>
          <circle class="underline-dot" id="underlineDot" cx="4" cy="7" r="4" opacity="0"/>
        </svg>
      </div>
    </div>

    <div id="sparkLayer"></div>
  </div>

<script src="../node_modules/gsap/dist/gsap.min.js"></script>
<script src="./animation.js"></script>
</body>
</html>
